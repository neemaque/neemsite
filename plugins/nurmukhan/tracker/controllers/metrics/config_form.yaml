# ===================================
#  Form Behavior Config
# ===================================

# Record name
name: Metric

# Model Form Field configuration
form: $/nurmukhan/tracker/models/metric/fields.yaml

# Model Class name
modelClass: Nurmukhan\Tracker\Models\Metric

# Default redirect location
defaultRedirect: nurmukhan/tracker/metrics

# Create page
create:
    title: backend::lang.form.create_title
    redirect: nurmukhan/tracker/metrics/update/:id
    redirectClose: nurmukhan/tracker/metrics

# Update page
update:
    title: backend::lang.form.update_title
    redirect: nurmukhan/tracker/metrics
    redirectClose: nurmukhan/tracker/metrics

# Preview page
preview:
    title: backend::lang.form.preview_title
