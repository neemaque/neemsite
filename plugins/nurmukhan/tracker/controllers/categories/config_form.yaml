# ===================================
#  Form Behavior Config
# ===================================

# Record name
name: Category

# Model Form Field configuration
form: $/nurmukhan/tracker/models/category/fields.yaml

# Model Class name
modelClass: Nurmukhan\Tracker\Models\Category

# Default redirect location
defaultRedirect: nurmukhan/tracker/categories

# Create page
create:
    title: backend::lang.form.create_title
    redirect: nurmukhan/tracker/categories/update/:id
    redirectClose: nurmukhan/tracker/categories

# Update page
update:
    title: backend::lang.form.update_title
    redirect: nurmukhan/tracker/categories
    redirectClose: nurmukhan/tracker/categories

# Preview page
preview:
    title: backend::lang.form.preview_title
